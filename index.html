<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa AI Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 85vh; background: #1e293b; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; }
        .chat-header { background: #2563eb; color: #ffffff; padding: 18px; text-align: center; font-weight: bold; font-size: 1.3rem; letter-spacing: 0.5px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .message.user { background: #2563eb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.bot { background: #334155; color: #f8fafc; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; padding: 15px; background: #1e293b; border-top: 1px solid #334155; }
        #message-input { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #475569; color: #f8fafc; border-radius: 25px; outline: none; font-size: 0.95rem; padding-left: 18px; }
        #send-btn { background: #2563eb; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Nexa AI</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">Hello! I am Nexa. Powered directly by Google Gemini. Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Ask Nexa anything..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        // PUT YOUR COPIED AQ... KEY INSIDE THESE QUOTES
        const GEMINI_API_KEY = "PASTE_YOUR_FULL_KEY_HERE";

        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function getAIResponse(userText) {
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot');
            typingDiv.innerText = "Nexa is thinking...";
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Correctly configured endpoint for your specific API key format
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Your name is Nexa. You are a helpful AI assistant. Answer clearly and briefly. User: ${userText}` }]
                        }]
                    })
                });

                const data = await response.json();
                chatMessages.removeChild(typingDiv);
                
                if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                    return data.candidates[0].content.parts[0].text;
                } else if (data && data.error) {
                    return "API Error: " + data.error.message;
                } else {
                    return "Error: Could not parse response layout.";
                }

            } catch (error) {
                chatMessages.removeChild(typingDiv);
                console.error("API Error:", error);
                return "Error: Request failed. Please check your network connection.";
            }
        }

        async function handleSendMessage() {
            const userText = messageInput.value.trim();
            if (userText === "") return;

            appendMessage(userText, 'user');
            messageInput.value = "";

            const aiReply = await getAIResponse(userText);
            appendMessage(aiReply, 'bot');
        }

        sendBtn.addEventListener('click', handleSendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendMessage();
        });
    </script>
</body>
</html>
